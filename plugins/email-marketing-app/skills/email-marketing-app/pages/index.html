<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MailPilot - Email Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          dark: { 900: '#0a0a0a', 800: '#141414', 700: '#1e1e1e', 600: '#262626', 500: '#333333' },
          accent: { DEFAULT: '#3b82f6', hover: '#2563eb', light: '#60a5fa' }
        }
      }
    }
  }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .spinner { border: 3px solid #333; border-top-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-dark-900 text-white min-h-screen">

  <!-- Toast container -->
  <div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Auth Screen -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center">
    <div class="bg-dark-800 border border-dark-600 rounded-2xl p-10 w-full max-w-sm">
      <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 mb-2">
          <svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span class="text-2xl font-bold">MailPilot</span>
        </div>
        <p class="text-neutral-400 text-sm">Email marketing made simple</p>
      </div>
      <div id="auth-error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-800 rounded-lg text-red-400 text-sm"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-neutral-400 mb-1">Email</label>
            <input type="email" name="email" required class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent placeholder-neutral-500" placeholder="you@example.com">
          </div>
          <div>
            <label class="block text-sm text-neutral-400 mb-1">Password</label>
            <input type="password" name="password" required minlength="6" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent placeholder-neutral-500" placeholder="••••••••">
          </div>
          <button type="submit" class="w-full py-2.5 bg-accent hover:bg-accent-hover rounded-lg font-medium transition-colors">Sign In</button>
        </div>
        <p class="text-center text-sm text-neutral-400 mt-4">Don't have an account? <a href="#" onclick="toggleAuth('signup')" class="text-accent hover:underline">Sign up</a></p>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="hidden" onsubmit="return handleSignup(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-neutral-400 mb-1">Email</label>
            <input type="email" name="email" required class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent placeholder-neutral-500" placeholder="you@example.com">
          </div>
          <div>
            <label class="block text-sm text-neutral-400 mb-1">Password</label>
            <input type="password" name="password" required minlength="6" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent placeholder-neutral-500" placeholder="••••••••">
          </div>
          <div>
            <label class="block text-sm text-neutral-400 mb-1">Confirm Password</label>
            <input type="password" name="confirm" required minlength="6" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent placeholder-neutral-500" placeholder="••••••••">
          </div>
          <button type="submit" class="w-full py-2.5 bg-accent hover:bg-accent-hover rounded-lg font-medium transition-colors">Create Account</button>
        </div>
        <p class="text-center text-sm text-neutral-400 mt-4">Already have an account? <a href="#" onclick="toggleAuth('login')" class="text-accent hover:underline">Sign in</a></p>
      </form>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen" class="hidden">
    <!-- Mobile header -->
    <div class="lg:hidden flex items-center justify-between p-4 bg-dark-800 border-b border-dark-600">
      <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="text-neutral-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="font-semibold">MailPilot</span>
      <div class="w-6"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-dark-800 border-r border-dark-600 flex flex-col z-40 transition-transform -translate-x-full lg:translate-x-0">
      <div class="p-5 border-b border-dark-600">
        <div class="flex items-center gap-2">
          <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span class="text-lg font-bold">MailPilot</span>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <a href="#dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-neutral-400 hover:text-white hover:bg-dark-700 transition-colors" data-page="dashboard">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Dashboard
        </a>
        <a href="#contacts" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-neutral-400 hover:text-white hover:bg-dark-700 transition-colors" data-page="contacts">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Contacts
        </a>
        <a href="#campaigns" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-neutral-400 hover:text-white hover:bg-dark-700 transition-colors" data-page="campaigns">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
          Campaigns
        </a>
        <a href="#templates" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-neutral-400 hover:text-white hover:bg-dark-700 transition-colors" data-page="templates">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm0 8a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/></svg>
          Templates
        </a>
      </nav>
      <div class="p-4 border-t border-dark-600">
        <p id="user-email" class="text-sm text-neutral-400 truncate mb-2"></p>
        <button onclick="logout()" class="text-sm text-neutral-500 hover:text-red-400 transition-colors">Sign out</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="lg:ml-60 min-h-screen">
      <header class="p-6 border-b border-dark-600">
        <h1 id="page-title" class="text-2xl font-bold"></h1>
      </header>
      <div id="content" class="p-6 fade-in"></div>
    </main>
  </div>

  <!-- Sidebar backdrop for mobile -->
  <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden" onclick="document.getElementById('sidebar').classList.add('-translate-x-full'); this.classList.add('hidden')"></div>

<script>
const state = {
  token: localStorage.getItem('token'),
  email: localStorage.getItem('email'),
  currentPage: 'dashboard'
};

// --- HTML escape (shared by all fragments) ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- API helper ---
async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const res = await fetch(path, { ...options, headers });
  if (res.status === 401) { logout(); return null; }
  return res;
}

// --- Toast ---
function showToast(message, type = 'success') {
  const el = document.createElement('div');
  el.className = `px-4 py-3 rounded-lg text-sm font-medium shadow-lg fade-in ${type === 'error' ? 'bg-red-900/80 text-red-200 border border-red-800' : 'bg-green-900/80 text-green-200 border border-green-800'}`;
  el.textContent = message;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Auth ---
function toggleAuth(mode) {
  document.getElementById('auth-error').classList.add('hidden');
  document.getElementById('login-form').classList.toggle('hidden', mode !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', mode !== 'signup');
}

async function handleLogin(e) {
  e.preventDefault();
  const form = e.target;
  const email = form.email.value;
  const password = form.password.value;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    state.token = data.token;
    state.email = email;
    localStorage.setItem('token', data.token);
    localStorage.setItem('email', email);
    showApp();
  } catch (err) {
    const el = document.getElementById('auth-error');
    el.textContent = err.message;
    el.classList.remove('hidden');
  }
  return false;
}

async function handleSignup(e) {
  e.preventDefault();
  const form = e.target;
  const email = form.email.value;
  const password = form.password.value;
  const confirm = form.confirm.value;
  if (password !== confirm) {
    const el = document.getElementById('auth-error');
    el.textContent = 'Passwords do not match';
    el.classList.remove('hidden');
    return false;
  }
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Signup failed');
    state.token = data.token;
    state.email = email;
    localStorage.setItem('token', data.token);
    localStorage.setItem('email', email);
    showApp();
  } catch (err) {
    const el = document.getElementById('auth-error');
    el.textContent = err.message;
    el.classList.remove('hidden');
  }
  return false;
}

function logout() {
  api('/api/auth/logout', { method: 'POST' });
  state.token = null;
  state.email = null;
  localStorage.removeItem('token');
  localStorage.removeItem('email');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}

// --- App ---
function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  document.getElementById('user-email').textContent = state.email;
  navigate(location.hash.slice(1) || 'dashboard');
}

// --- Router ---
const pageTitles = { dashboard: 'Dashboard', contacts: 'Contacts', campaigns: 'Campaigns', templates: 'Templates' };

async function navigate(page) {
  if (!pageTitles[page]) page = 'dashboard';
  state.currentPage = page;
  document.getElementById('page-title').textContent = pageTitles[page];

  // Update nav active state
  document.querySelectorAll('.nav-link').forEach(link => {
    const isActive = link.dataset.page === page;
    link.classList.toggle('text-accent', isActive);
    link.classList.toggle('bg-dark-700', isActive);
    link.classList.toggle('text-neutral-400', !isActive);
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('sidebar-backdrop').classList.add('hidden');

  const content = document.getElementById('content');

  if (page === 'dashboard') {
    renderDashboard(content);
    return;
  }

  // Load fragment
  content.innerHTML = '<div class="flex justify-center py-20"><div class="spinner"></div></div>';
  try {
    const res = await fetch('/' + page + '.html');
    if (!res.ok) throw new Error('Failed to load page');
    content.innerHTML = '<div class="fade-in">' + await res.text() + '</div>';
    executeScripts(content);
  } catch {
    content.innerHTML = '<p class="text-red-400">Failed to load page.</p>';
  }
}

function executeScripts(container) {
  container.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}

async function renderDashboard(container) {
  const cards = [
    { label: 'Total Contacts', key: 'totalContacts', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>' },
    { label: 'Total Campaigns', key: 'totalCampaigns', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>' },
    { label: 'Emails Sent', key: 'totalSent', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>' },
    { label: 'Open Rate', key: 'openRate', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>' }
  ];

  container.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 fade-in">
    ${cards.map(c => `<div class="bg-dark-800 border border-dark-600 rounded-xl p-6">
      <div class="flex items-center gap-3 mb-3">
        <div class="p-2 bg-accent/10 rounded-lg"><svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">${c.icon}</svg></div>
        <span class="text-neutral-400 text-sm">${c.label}</span>
      </div>
      <div id="stat-${c.key}" class="text-3xl font-bold">-</div>
    </div>`).join('')}
  </div>`;

  try {
    const res = await api('/api/dashboard');
    if (!res) return;
    const data = await res.json();
    document.getElementById('stat-totalContacts').textContent = data.totalContacts || 0;
    document.getElementById('stat-totalCampaigns').textContent = data.totalCampaigns || 0;
    document.getElementById('stat-totalSent').textContent = data.totalSent || 0;
    const rate = data.totalSent > 0 ? Math.round((data.totalOpened / data.totalSent) * 100) : 0;
    document.getElementById('stat-openRate').textContent = rate + '%';
  } catch {}
}

// --- Init ---
window.addEventListener('hashchange', () => navigate(location.hash.slice(1) || 'dashboard'));
if (state.token) { showApp(); } else {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}
</script>
</body>
</html>
