<!-- Campaigns page fragment — injected into #content by index.html -->
<div>
  <!-- List view -->
  <div id="cp-list-view">
    <div class="flex items-center justify-between mb-6">
      <div></div>
      <button onclick="cpNewCampaign()" class="px-4 py-2 bg-accent hover:bg-accent-hover rounded-lg text-sm font-medium transition-colors">New Campaign</button>
    </div>
    <div id="cp-campaigns" class="grid gap-4"></div>
    <div id="cp-empty" class="hidden bg-dark-800 border border-dark-600 rounded-xl p-12 text-center text-neutral-500">No campaigns yet. Create your first campaign.</div>
  </div>

  <!-- Editor view -->
  <div id="cp-editor-view" class="hidden">
    <button onclick="cpBackToList()" class="flex items-center gap-2 text-neutral-400 hover:text-white mb-6 text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Campaigns
    </button>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Editor panel -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-neutral-400 mb-1">Campaign Name *</label>
          <input id="cp-name" type="text" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent text-sm" placeholder="Monthly Newsletter">
        </div>
        <div>
          <label class="block text-sm text-neutral-400 mb-1">Subject Line *</label>
          <input id="cp-subject" type="text" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent text-sm" placeholder="Your monthly update">
        </div>
        <div>
          <label class="block text-sm text-neutral-400 mb-1">Template</label>
          <select id="cp-template" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-accent text-sm">
            <option value="">None (custom HTML)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-neutral-400 mb-1">HTML Content</label>
          <textarea id="cp-html" rows="14" class="w-full px-3 py-2 bg-dark-700 border border-dark-500 rounded-lg text-white font-mono text-sm focus:outline-none focus:ring-2 focus:ring-accent" placeholder="<h1>Hello!</h1><p>Your content here...</p>"></textarea>
        </div>
        <div id="cp-draft-actions" class="flex flex-wrap gap-3">
          <button onclick="cpSave()" class="px-4 py-2 border border-dark-500 text-neutral-300 hover:text-white hover:border-neutral-400 rounded-lg text-sm transition-colors">Save Draft</button>
          <button onclick="cpSend()" class="px-4 py-2 bg-accent hover:bg-accent-hover rounded-lg text-sm font-medium transition-colors">Send Campaign</button>
          <button id="cp-delete-btn" onclick="cpDelete()" class="px-4 py-2 text-red-400 hover:text-red-300 text-sm transition-colors">Delete</button>
        </div>
      </div>

      <!-- Preview panel -->
      <div>
        <label class="block text-sm text-neutral-400 mb-1">Preview</label>
        <div class="bg-white rounded-lg overflow-hidden" style="min-height: 400px;">
          <iframe id="cp-preview" sandbox class="w-full" style="min-height: 400px; border: none;"></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats view (for sent campaigns) -->
  <div id="cp-stats-view" class="hidden">
    <button onclick="cpBackToList()" class="flex items-center gap-2 text-neutral-400 hover:text-white mb-6 text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Campaigns
    </button>
    <h2 id="cp-stats-title" class="text-xl font-bold mb-4"></h2>
    <div id="cp-stats-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6"></div>
    <div class="bg-dark-800 border border-dark-600 rounded-xl p-4">
      <h3 class="text-sm font-medium text-neutral-400 mb-2">Open Rate</h3>
      <div class="w-full bg-dark-600 rounded-full h-3">
        <div id="cp-stats-bar" class="bg-accent rounded-full h-3 transition-all" style="width: 0%"></div>
      </div>
      <p id="cp-stats-bar-label" class="text-sm text-neutral-400 mt-1"></p>
    </div>
  </div>
</div>

<script>
(function() {
  let campaigns = [];
  let templates = [];
  let editingId = null;

  const statusStyle = { draft: 'bg-neutral-800 text-neutral-400', sending: 'bg-yellow-900/50 text-yellow-400', sent: 'bg-green-900/50 text-green-400' };

  async function loadCampaigns() {
    const res = await api('/api/campaigns');
    if (!res) return;
    campaigns = await res.json();
    renderList();
  }

  async function loadTemplates() {
    const res = await api('/api/templates');
    if (!res) return;
    templates = await res.json();
    const sel = document.getElementById('cp-template');
    // Build options safely
    sel.textContent = '';
    const none = document.createElement('option');
    none.value = '';
    none.textContent = 'None (custom HTML)';
    sel.appendChild(none);
    templates.forEach(function(t) {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  }

  function renderList() {
    const container = document.getElementById('cp-campaigns');
    const empty = document.getElementById('cp-empty');
    if (!campaigns.length) { container.textContent = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    // Build cards using safe DOM methods
    container.textContent = '';
    campaigns.forEach(function(c) {
      const openRate = c.total_sends > 0 ? Math.round((c.opened_count / c.total_sends) * 100) : 0;
      const card = document.createElement('div');
      card.className = 'bg-dark-800 border border-dark-600 rounded-xl p-5 hover:border-dark-500 cursor-pointer transition-colors';
      card.addEventListener('click', function() { cpOpen(c.id); });

      const header = document.createElement('div');
      header.className = 'flex items-start justify-between mb-2';
      const title = document.createElement('h3');
      title.className = 'font-semibold text-white';
      title.textContent = c.name;
      const badge = document.createElement('span');
      badge.className = 'px-2 py-0.5 text-xs rounded-full ' + (statusStyle[c.status] || '');
      badge.textContent = c.status;
      header.appendChild(title);
      header.appendChild(badge);

      const subject = document.createElement('p');
      subject.className = 'text-sm text-neutral-400 mb-3';
      subject.textContent = c.subject || 'No subject';

      const info = document.createElement('p');
      info.className = 'text-xs text-neutral-500';
      if (c.status === 'sent') {
        info.textContent = c.total_sends + ' sent \u00B7 ' + c.opened_count + ' opened \u00B7 ' + openRate + '% open rate';
      } else {
        info.textContent = new Date(c.created_at).toLocaleDateString();
      }

      card.appendChild(header);
      card.appendChild(subject);
      card.appendChild(info);
      container.appendChild(card);
    });
  }

  function showView(view) {
    document.getElementById('cp-list-view').classList.toggle('hidden', view !== 'list');
    document.getElementById('cp-editor-view').classList.toggle('hidden', view !== 'editor');
    document.getElementById('cp-stats-view').classList.toggle('hidden', view !== 'stats');
  }

  // Template selection auto-fills
  document.getElementById('cp-template').addEventListener('change', function() {
    const t = templates.find(function(x) { return x.id === this.value; }.bind(this));
    if (t) {
      document.getElementById('cp-subject').value = t.subject || '';
      document.getElementById('cp-html').value = t.html || '';
      updatePreview();
    }
  });

  // Live preview — uses sandboxed iframe srcdoc (safe: no script execution)
  document.getElementById('cp-html').addEventListener('input', updatePreview);
  function updatePreview() {
    const iframe = document.getElementById('cp-preview');
    const html = document.getElementById('cp-html').value;
    iframe.srcdoc = html || '<p style="color:#999;padding:20px;font-family:sans-serif;">HTML preview will appear here...</p>';
  }

  window.cpNewCampaign = function() {
    editingId = null;
    document.getElementById('cp-name').value = '';
    document.getElementById('cp-subject').value = '';
    document.getElementById('cp-template').value = '';
    document.getElementById('cp-html').value = '';
    document.getElementById('cp-delete-btn').classList.add('hidden');
    document.getElementById('cp-draft-actions').classList.remove('hidden');
    updatePreview();
    showView('editor');
  };

  window.cpOpen = function(id) {
    const c = campaigns.find(function(x) { return x.id === id; });
    if (!c) return;
    editingId = id;
    if (c.status === 'sent') {
      // Show stats view with safe DOM methods
      document.getElementById('cp-stats-title').textContent = c.name;
      const openRate = c.total_sends > 0 ? Math.round((c.opened_count / c.total_sends) * 100) : 0;
      const statsGrid = document.getElementById('cp-stats-grid');
      statsGrid.textContent = '';
      [
        { label: 'Total Sent', value: c.total_sends },
        { label: 'Delivered', value: c.sent_count },
        { label: 'Opened', value: c.opened_count },
        { label: 'Open Rate', value: openRate + '%' }
      ].forEach(function(s) {
        const card = document.createElement('div');
        card.className = 'bg-dark-800 border border-dark-600 rounded-xl p-4 text-center';
        const val = document.createElement('div');
        val.className = 'text-2xl font-bold';
        val.textContent = s.value;
        const lbl = document.createElement('div');
        lbl.className = 'text-xs text-neutral-400 mt-1';
        lbl.textContent = s.label;
        card.appendChild(val);
        card.appendChild(lbl);
        statsGrid.appendChild(card);
      });
      document.getElementById('cp-stats-bar').style.width = openRate + '%';
      document.getElementById('cp-stats-bar-label').textContent = c.opened_count + ' of ' + c.total_sends + ' recipients opened';
      showView('stats');
    } else {
      // Edit draft
      document.getElementById('cp-name').value = c.name;
      document.getElementById('cp-subject').value = c.subject || '';
      document.getElementById('cp-template').value = '';
      document.getElementById('cp-html').value = c.html || '';
      document.getElementById('cp-delete-btn').classList.remove('hidden');
      document.getElementById('cp-draft-actions').classList.remove('hidden');
      updatePreview();
      showView('editor');
    }
  };

  window.cpBackToList = function() { showView('list'); loadCampaigns(); };

  window.cpSave = async function() {
    const name = document.getElementById('cp-name').value.trim();
    const subject = document.getElementById('cp-subject').value.trim();
    const html = document.getElementById('cp-html').value;
    const template_id = document.getElementById('cp-template').value || undefined;
    if (!name) { showToast('Name is required', 'error'); return; }
    const body = JSON.stringify({ name, subject, html, template_id });
    let res;
    if (editingId) {
      res = await api('/api/campaigns/' + editingId, { method: 'PUT', body });
    } else {
      res = await api('/api/campaigns', { method: 'POST', body });
      if (res && res.ok) { const d = await res.json(); editingId = d.id; }
    }
    if (!res) return;
    if (!res.ok) { const d = await res.json(); showToast(d.error || 'Failed', 'error'); return; }
    showToast('Campaign saved');
    document.getElementById('cp-delete-btn').classList.remove('hidden');
  };

  window.cpSend = async function() {
    if (!editingId) { await cpSave(); if (!editingId) return; }
    const name = document.getElementById('cp-name').value.trim();
    if (!confirm('Send "' + name + '" to all active contacts?')) return;
    await cpSave();
    const res = await api('/api/campaigns/' + editingId + '/send', { method: 'POST' });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Send failed', 'error'); return; }
    showToast('Sent to ' + data.sent + ' contacts' + (data.failed ? ', ' + data.failed + ' failed' : ''));
    cpBackToList();
  };

  window.cpDelete = async function() {
    if (!editingId || !confirm('Delete this campaign?')) return;
    const res = await api('/api/campaigns/' + editingId, { method: 'DELETE' });
    if (!res) return;
    if (!res.ok) { showToast('Failed to delete', 'error'); return; }
    showToast('Campaign deleted');
    cpBackToList();
  };

  loadCampaigns();
  loadTemplates();
})();
</script>
